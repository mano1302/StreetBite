<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreetBite - Street Food Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 id="app-title"><span class="logo-icon">🍽️</span> StreetBite</h1>
            <div class="header-buttons">
                <button class="location-badge" id="header-location-btn" onclick="openLocationSelector()">
                    <span class="location-icon">📍</span>
                    <span id="header-location-text">Select Location</span>
                </button>
                <select class="language-selector" id="header-language-select" onchange="changeLanguage(this.value)">
                    <option value="en">🇬🇧 English</option>
                    <option value="ta">🇮🇳 தமிழ்</option>
                    <option value="hi">🇮🇳 हिंदी</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Loading Spinner -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Location Selector Modal -->
    <div id="location-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="location-modal-title">📍 Select Your Location</h2>
                <button class="modal-close" id="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-subtitle" id="location-modal-subtitle">Choose your city to find local street food shops nearby</p>
                <div class="location-search-box">
                    <input type="text" id="city-search" class="city-search-input" placeholder="🔍 Search city name..." autocomplete="off">
                </div>
                <div class="city-list" id="city-list"></div>
                <div class="area-section" id="area-section" style="display: none;">
                    <h3 class="area-title"><span id="area-title-prefix">Select Area in</span> <span id="selected-city-name"></span></h3>
                    <div class="area-list" id="area-list"></div>
                    <button class="skip-area-btn" id="skip-area-btn">Skip - Show All Shops</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main id="app" class="main-content"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Search</span>
        </button>
        <button class="nav-item" data-page="add">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Add Shop</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>

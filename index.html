<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreetBite - Street Food Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 id="app-title"><span class="logo-icon">🍽️</span> StreetBite</h1>
            <select class="language-selector" id="header-language-select" onchange="changeLanguage(this.value)">
                <option value="en">🇬🇧 English</option>
                <option value="ta">🇮🇳 தமிழ்</option>
                <option value="hi">🇮🇳 हिंदी</option>
            </select>
        </div>
    </header>

    <!-- Loading Spinner -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Main Content -->
    <main id="app" class="main-content"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Search</span>
        </button>
        <button class="nav-item" data-page="add">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Add Shop</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>

services:
  - type: web
    name: streetbite
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    rootDir: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: streetbite-db
          property: connectionString

databases:
  - name: streetbite-db
    plan: free
    databaseName: streetbite
    user: streetbite
